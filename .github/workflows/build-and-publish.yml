name: Build and Publish Container Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ol_version: ["8", "10"]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase repository name
        id: repo
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository }}/oracle-linux-${{ matrix.ol_version }}-dev' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        id: dockerhub-check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        if: steps.dockerhub-check.outputs.available == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      - name: Prepare build context (docs)
        run: |
          # README の相対リンクを GitHub 絶対 URL に変換して src/ へ配置
          BASE_BLOB="https://github.com/${{ github.repository }}/blob/main"
          BASE_TREE="https://github.com/${{ github.repository }}/tree/main"
          sed \
            -e "s|](\./\([^)]*\)/)|](${BASE_TREE}/\1/)|g" \
            -e "s|](\./\([^)]*\))|](${BASE_BLOB}/\1)|g" \
            -e "s|](docs-src/\([^)]*\)/)|](${BASE_TREE}/docs-src/\1/)|g" \
            -e "s|](docs-src/)|](${BASE_TREE}/docs-src/)|g" \
            -e "s|](docs-src/\([^)]*\))|](${BASE_BLOB}/docs-src/\1)|g" \
            -e "s|](examples/\([^)]*\)/)|](${BASE_TREE}/examples/\1/)|g" \
            -e "s|](examples/\([^)]*\))|](${BASE_BLOB}/examples/\1)|g" \
            -e "s|](CLAUDE\.md)|](${BASE_BLOB}/CLAUDE.md)|g" \
            README.md > src/README.md

          # LICENSE をビルドコンテキストにコピー
          cp LICENSE src/LICENSE

      - name: Build container image
        run: |
          # 必要なディレクトリを作成
          mkdir -p src/keys src/packages src/fonts

          # container-release の作成
          {
            echo "# Container Build Information"
            printf "%-18s = %s\n" "BUILD_TYPE" "github-actions"
            printf "%-18s = %s\n" "BUILD_DATE" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf "%-18s = %s\n" "BUILD_HOST" "$(uname -n 2>/dev/null || echo 'github-runner')"

            # Git コミットハッシュと変更状態の取得
            GIT_COMMIT="${{ github.sha }}"
            git diff-index --quiet HEAD 2>/dev/null || GIT_COMMIT="${GIT_COMMIT}+"
            printf "%-18s = %s\n" "GIT_COMMIT" "${GIT_COMMIT}"

            printf "%-18s = %s\n" "GIT_BRANCH" "${{ github.ref_name }}"

            # タグの取得とバージョン抽出
            if [ "${{ github.ref_type }}" = "tag" ]; then
              printf "%-18s = %s\n" "GIT_TAG" "${{ github.ref_name }}"
              VERSION="${{ github.ref_name }}"
              VERSION="${VERSION#v}"
              printf "%-18s = %s\n" "VERSION" "${VERSION}"
            else
              printf "%-18s = %s\n" "GIT_TAG" "(none)"
              printf "%-18s = %s\n" "VERSION" "dev"
            fi

            printf "%-18s = %s\n" "BUILDER" "${{ github.actor }}"
            printf "%-18s = %s\n" "GITHUB_REPOSITORY" "${{ github.repository }}"
            printf "%-18s = %s\n" "GITHUB_RUN_ID" "${{ github.run_id }}"
            printf "%-18s = %s\n" "GITHUB_RUN_NUMBER" "${{ github.run_number }}"
          } > src/container-release

          cd src
          # OCI イメージラベル: GitHub Packages のパッケージ説明として表示される
          podman build \
            --build-arg OL_VERSION=${{ matrix.ol_version }} \
            --label "org.opencontainers.image.description=Oracle Linux ${{ matrix.ol_version }} development container image with Node.js, Java, .NET, Python, and documentation tools" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Test container image
        run: |
          # コンテナをバックグラウンドで起動
          CONTAINER_ID=$(podman run -d \
            -e HOST_USER=testuser \
            -e HOST_UID=1000 \
            -e HOST_GID=1000 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }})

          # entrypoint.sh の処理完了を待つ
          sleep 5

          # コンテナ内でバージョン確認
          echo "=== Node.js version ==="
          podman exec $CONTAINER_ID node --version

          echo "=== npm version ==="
          podman exec $CONTAINER_ID npm --version

          echo "=== Java version ==="
          podman exec $CONTAINER_ID java --version

          echo "=== Java 11 version ==="
          JAVA11=$(podman exec $CONTAINER_ID find /usr/lib/jvm -name 'java' -path '*/java-11*' -type f | head -1)
          if [ -n "$JAVA11" ]; then
            podman exec $CONTAINER_ID $JAVA11 --version
          else
            echo "Java 11 not found (skipped)"
          fi

          echo "=== Python version ==="
          podman exec $CONTAINER_ID python --version

          echo "=== Python 3.11 version ==="
          if podman exec $CONTAINER_ID which python3.11 > /dev/null 2>&1; then
            podman exec $CONTAINER_ID python3.11 --version
          else
            echo "python3.11 not found (skipped)"
          fi

          echo "=== OpenSSH version ==="
          podman exec $CONTAINER_ID ssh -V

          echo "=== .NET version ==="
          podman exec $CONTAINER_ID dotnet --version

          echo "=== Doxygen version ==="
          podman exec $CONTAINER_ID doxygen --version

          echo "=== PlantUML version ==="
          podman exec $CONTAINER_ID plantuml -version

          # sshd が起動しているか確認
          echo "=== Checking sshd process ==="
          podman exec $CONTAINER_ID pgrep sshd
          echo "sshd is running"

          # クリーンアップ
          podman stop $CONTAINER_ID
          podman rm $CONTAINER_ID

      - name: Build WSL derivative image
        run: |
          WSL_BUILD_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-wsl-build"

          cd src
          podman build \
            --build-arg BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -f Containerfile.wsl \
            -t "$WSL_BUILD_IMAGE" \
            .

          echo "WSL_BUILD_IMAGE=$WSL_BUILD_IMAGE" >> $GITHUB_ENV

      - name: Push container image
        if: github.event_name != 'pull_request'
        run: |
          # メタデータから生成されたタグをすべて適用して push
          TAGS="${{ steps.meta.outputs.tags }}"
          for tag in $TAGS; do
            echo "Tagging and pushing: $tag"
            podman tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} $tag
            podman push $tag
          done

      - name: Push container image to Docker Hub
        if: github.event_name != 'pull_request' && steps.dockerhub-check.outputs.available == 'true'
        run: |
          DOCKERHUB_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/oracle-linux-${{ matrix.ol_version }}-dev"
          TAGS="${{ steps.meta.outputs.tags }}"
          for tag in $TAGS; do
            DH_TAG="${DOCKERHUB_IMAGE}:${tag##*:}"
            echo "Tagging and pushing to Docker Hub: $DH_TAG"
            podman tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} $DH_TAG
            podman push $DH_TAG
          done

      - name: Update Docker Hub description
        if: github.event_name != 'pull_request' && steps.dockerhub-check.outputs.available == 'true'
        run: |
          # src/README.md (リンク変換済み) を Docker Hub description 用にコピー
          cp src/README.md /tmp/dockerhub-readme.md

      - name: Push Docker Hub description
        if: github.event_name != 'pull_request' && steps.dockerhub-check.outputs.available == 'true'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/oracle-linux-${{ matrix.ol_version }}-dev
          short-description: Oracle Linux ${{ matrix.ol_version }} dev container with Node.js 24, Java, .NET 10, Python, docs tools, Japanese support
          readme-filepath: /tmp/dockerhub-readme.md

      - name: Export and push WSL rootfs as OCI artifact
        if: github.event_name != 'pull_request'
        run: |
          # WSL 用 rootfs のエクスポート
          echo "==> Exporting WSL rootfs..."
          CONTAINER_ID=$(podman create "$WSL_BUILD_IMAGE")
          podman export $CONTAINER_ID | gzip > wsl-rootfs.tar.gz
          podman rm $CONTAINER_ID

          # ファイルサイズを記録
          ls -lh wsl-rootfs.tar.gz

          # ORAS のインストール
          echo "==> Installing ORAS..."
          ORAS_VERSION="1.1.0"
          curl -sLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          chmod +x oras

          # OCI Artifact として push (タグごと)
          echo "==> Pushing WSL rootfs as OCI artifact..."
          TAGS="${{ steps.meta.outputs.tags }}"
          for tag in $TAGS; do
            # コンテナイメージのタグから WSL rootfs のタグを生成
            WSL_TAG="${tag}-wsl"
            echo "Pushing WSL rootfs: $WSL_TAG"

            # OCI アノテーション: GitHub Packages のパッケージ説明として表示される
            ./oras push "$WSL_TAG" \
              wsl-rootfs.tar.gz:application/vnd.wsl.rootfs.v1.tar+gzip \
              --annotation "org.opencontainers.image.title=WSL2 Rootfs for Oracle Linux ${{ matrix.ol_version }} Development" \
              --annotation "org.opencontainers.image.description=Oracle Linux ${{ matrix.ol_version }} development environment as WSL2-importable rootfs" \
              --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
              --annotation "org.opencontainers.image.revision=${{ github.sha }}" \
              --annotation "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          done

          echo "==> WSL rootfs published successfully"

      - name: Output image information
        if: github.event_name != 'pull_request'
        run: |
          echo "## Container Image Published (OL${{ matrix.ol_version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Container Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### WSL2 Rootfs Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | sed 's/$/-wsl/' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull command (Container)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "podman pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Import to WSL2" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`powershell" >> $GITHUB_STEP_SUMMARY
          echo "# Download and run the import script" >> $GITHUB_STEP_SUMMARY
          echo "irm https://raw.githubusercontent.com/${{ github.repository }}/main/examples/import-wsl/import-wsl.ps1 | iex" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
